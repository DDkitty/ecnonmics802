                <ol>
                    <li>
                        <strong>国家助学金</strong>：每人都有，每个月500元，发12个月。寒暑假的助学金会提前发放。
                    </li>
                    <li>
                        <strong>学业奖学金</strong>：第一学年所有考生均可以拿到奖学金，但第二三学年有15%的学生拿不到奖学金。
                        <br>
                        这个措施很明显是要鼓励同学们入校之后将更多精力放在学习上，而不像以前哪怕排到最后一名，也可以拿到奖学金。同时这也是对科学学位研究生学费降低的一种补偿。
                    </li>
