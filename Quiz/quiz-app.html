    <script>
        let questions = [];
        let filteredQuestions = [];
        let currentIndex = 0;
        let favorites = new Map();
        let completedQuestions = new Set();
        let showAnswer = false;

        document.addEventListener('DOMContentLoaded', function() {
            loadQuestions();
            loadProgress();
            updateStats();
        });

        async function loadQuestions() {
            try {
                console.log('开始加载题目...');
                const timestamp = new Date().getTime();
                const response = await fetch(`../Question/question.json?t=${timestamp}`);
                console.log('响应状态:', response.status, response.statusText);
                console.log('响应类型:', response.type);
                console.log('响应头:', response.headers);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                let text = await response.text();
                console.log('响应文本长度:', text.length);
                console.log('响应文本前100字符:', text.substring(0, 100));
                
                // 移除BOM（如果存在）
                if (text.charCodeAt(0) === 0xFEFF) {
                    text = text.substring(1);
                }
                
                const data = JSON.parse(text);
                console.log('解析后的数据:', data);
                console.log('题目数量:', data.length);
                
                questions = data;
                applyFilters();
            } catch (error) {
                console.error('加载题目失败:', error);
                console.error('错误堆栈:', error.stack);
                document.getElementById('quizContent').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">❌</div>
                        <div>加载题目失败，请刷新页面重试</div>
                        <div style="font-size: 0.8rem; color: #666; margin-top: 10px;">错误信息: ${error.message}</div>
                    </div>
                `;
            }
        }

        function applyFilters() {
            const subjectFilter = document.getElementById('subjectFilter').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const chapterFilter = document.getElementById('chapterFilter').value;

            filteredQuestions = questions.filter(q => {
                const subject = q['subject'] || q['学科'];
                const type = q['type'] || q['类型'];
                const chapter = q['chapter'] || q['章节'];
                
                if (subjectFilter && subject !== subjectFilter) return false;
                if (typeFilter && type !== typeFilter) return false;
                if (chapterFilter && chapter !== chapterFilter) return false;
                return true;
            });

            currentIndex = 0;
            updateFilterOptions();
            displayQuestion();
        }

        function updateFilterOptions() {
            const subjects = [...new Set(questions.map(q => q['subject'] || q['学科']))];
            const types = [...new Set(questions.map(q => q['type'] || q['类型']))];
            const chapters = [...new Set(questions.map(q => q['chapter'] || q['章节']))];

            updateSelectOptions('subjectFilter', subjects, '全部学科');
            updateSelectOptions('typeFilter', types, '全部类型');
            updateSelectOptions('chapterFilter', chapters, '全部章节');
        }

        function updateSelectOptions(selectId, options, defaultText) {
            const select = document.getElementById(selectId);
            const currentValue = select.value;
            select.innerHTML = `<option value="">${defaultText}</option>`;
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                select.appendChild(option);
            });
            select.value = currentValue;
        }

        function displayQuestion() {
            const content = document.getElementById('quizContent');
            
            if (filteredQuestions.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div>没有找到符合条件的题目</div>
                    </div>
                `;
                return;
            }

            const question = filteredQuestions[currentIndex];
            const isFavorite = favorites.has(currentIndex);
            const isCompleted = completedQuestions.has(currentIndex);
            
            const subject = question['subject'] || question['学科'];
            const type = question['type'] || question['类型'];
            const chapter = question['chapter'] || question['章节'];
            const questionText = question['question'] || question['题目'];
            const answerText = question['answer'] || question['参考答案'];

        function parseMarkdown(text) {
            if (!text) return '';
            
            let html = text;
            
            // 先处理块级公式 $$...$$ 和 \[...\]
            html = html.replace(/\$\$([^$]+)\$\$/g, function(match, p1) {
                try {
                    return 'KATEX_BLOCK_START' + p1 + 'KATEX_BLOCK_END';
                } catch (e) {
                    console.error('KaTeX渲染错误:', e);
                    return match;
                }
            });
            
            html = html.replace(/\\\[(.*?)\\\]/g, function(match, p1) {
                try {
                    return 'KATEX_BLOCK_START' + p1 + 'KATEX_BLOCK_END';
                } catch (e) {
                    console.error('KaTeX渲染错误:', e);
                    return match;
                }
            });
            
            // 处理行内公式 $...$ 和 \(...\)
            html = html.replace(/\$([^$]+)\$/g, function(match, p1) {
                try {
                    return 'KATEX_INLINE_START' + p1 + 'KATEX_INLINE_END';
                } catch (e) {
                    console.error('KaTeX渲染错误:', e);
                    return match;
                }
            });
            
            html = html.replace(/\\\((.*?)\\\)/g, function(match, p1) {
                try {
                    return 'KATEX_INLINE_START' + p1 + 'KATEX_INLINE_END';
                } catch (e) {
                    console.error('KaTeX渲染错误:', e);
                    return match;
                }
            });
            
            // 处理其他Markdown格式（在公式占位符之外）
            html = html
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/__(.*?)__/g, '<u>$1</u>')
                .replace(/~~(.*?)~~/g, '<del>$1</del>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
            
            // 渲染KaTeX公式
            html = html.replace(/KATEX_BLOCK_START(.*?)KATEX_BLOCK_END/g, function(match, p1) {
                try {
                    if (typeof katex !== 'undefined' && katex.renderToString) {
                        return katex.renderToString(p1, { displayMode: true, throwOnError: false });
                    } else {
                        return '$$' + p1 + '$$';
                    }
                } catch (e) {
                    console.error('KaTeX渲染错误:', e);
                    return match;
                }
            });
            
            html = html.replace(/KATEX_INLINE_START(.*?)KATEX_INLINE_END/g, function(match, p1) {
                try {
                    if (typeof katex !== 'undefined' && katex.renderToString) {
                        return katex.renderToString(p1, { displayMode: false, throwOnError: false });
                    } else {
                        return '$' + p1 + '$';
                    }
                } catch (e) {
                    console.error('KaTeX渲染错误:', e);
                    return match;
                }
            });
            
            return html;
        }

                    <div class="favorite-empty">
                        <div class="favorite-empty-icon">⭐</div>
                        <div class="favorite-empty-text">暂无收藏题目</div>
                    </div>
                `;
            } else {
                const favoriteArray = Array.from(favorites.entries()).sort((a, b) => {
                    return new Date(b[1].timestamp) - new Date(a[1].timestamp);
                });
                
                favoritesList.innerHTML = favoriteArray.map(([index, data]) => {
                    const question = questions[index];
                    if (!question) return '';
                    
                    const subject = question['subject'] || question['学科'];
                    const type = question['type'] || question['类型'];
                    const chapter = question['chapter'] || question['章节'];
                    const questionText = question['question'] || question['题目'];
                    const answerText = question['answer'] || question['参考答案'];
                    const favoriteTime = new Date(data.timestamp).toLocaleString('zh-CN');
                    
                    return `
                        <div class="favorite-item">
                            <div class="favorite-header">
                                <div class="favorite-info">
                                    <span class="favorite-tag favorite-tag-subject">${subject}</span>
                                    <span class="favorite-tag favorite-tag-type">${type}</span>
                                    <span class="favorite-tag favorite-tag-chapter">${chapter}</span>
                                </div>
                                <div class="favorite-time">${favoriteTime}</div>
                            </div>
                            <div class="favorite-question">
                                ${parseMarkdown(questionText)}
                            </div>
                            <div class="favorite-answer">
                                <div class="favorite-answer-title">💡 参考答案</div>
                                <div class="favorite-answer-content">
                                    ${parseMarkdown(answerText)}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeFavoritesModal() {
            const modal = document.getElementById('favoritesModal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function markAsCompleted() {
            completedQuestions.add(currentIndex);
            saveProgress();
            updateStats();
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === filteredQuestions.length - 1;
        }

        function goToPrevious() {
            if (currentIndex > 0) {
                currentIndex--;
                showAnswer = false;
                displayQuestion();
            }
        }

        function goToNext() {
            if (currentIndex < filteredQuestions.length - 1) {
                currentIndex++;
                showAnswer = false;
                displayQuestion();
            }
        }

        function saveProgress() {
            const progress = {
                favorites: Array.from(favorites.entries()),
                completed: Array.from(completedQuestions),
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('quizProgress', JSON.stringify(progress));
        }

        function loadProgress() {
            const saved = localStorage.getItem('quizProgress');
            if (saved) {
                const progress = JSON.parse(saved);
                favorites = new Map();
                completedQuestions = new Set(progress.completed || []);
                
                if (progress.favorites && Array.isArray(progress.favorites)) {
                    progress.favorites.forEach(item => {
                        if (Array.isArray(item) && item.length === 2) {
                            favorites.set(item[0], item[1]);
                        } else if (typeof item === 'number') {
                            favorites.set(item, {
                                timestamp: new Date().toISOString()
                            });
                        }
                    });
                }
            }
        }

        function updateStats() {
            document.getElementById('totalQuestions').textContent = questions.length;
            document.getElementById('completedQuestions').textContent = completedQuestions.size;
            document.getElementById('favoriteCount').textContent = favorites.size;
            
            const progressPercent = questions.length > 0 ? Math.round((completedQuestions.size / questions.length) * 100) : 0;
            const progressBar = document.querySelector('.progress-fill');
            if (progressBar) {
                progressBar.style.width = `${progressPercent}%`;
            }
        }

        document.getElementById('subjectFilter').addEventListener('change', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);
        document.getElementById('chapterFilter').addEventListener('change', applyFilters);
        document.getElementById('prevBtn').addEventListener('click', goToPrevious);
        document.getElementById('nextBtn').addEventListener('click', goToNext);
        
        document.getElementById('favoritesModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeFavoritesModal();
            }
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeFavoritesModal();
            }
        });
    </script>
</body>
</html>
