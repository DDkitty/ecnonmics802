            font-weight: 600;
        }

            color: #3498db;
        }

        }
        
        .radar-chart {
            grid-column: span 3;
        }
        
        .time-heatmap {
            grid-column: span 6;
        }
        
        .stacked-bar {
            grid-column: span 6;
        }
        
        .wordcloud {
            grid-column: span 4;
        }
        
        .boxplot {
            grid-column: span 4;
        }
        
        .sankey-chart {
            grid-column: span 4;
        }
        
        .network-chart {

            .stats-container {

        <!-- 统计卡片 -->

                </div>
                <div class="chart-wrapper" id="trend-chart"></div>
            </div>
            
            <!-- 2. 学科占比分析 -->

            </div>
            
            <!-- 3. 章节对比雷达图 -->

                <h3 class="chart-title">📊 章节对比雷达图</h3>
                <div class="chart-wrapper" id="radar-chart"></div>
            </div>
            
            <!-- 4. 时间-章节热力图 -->
            <div class="chart-container time-heatmap">
                <h3 class="chart-title">🔥 时间-章节热力图</h3>
                <div class="chart-wrapper" id="time-chapter-heatmap"></div>
            </div>
            
            <!-- 5. 堆积柱状图 -->
            <div class="chart-container stacked-bar">
                <h3 class="chart-title">📊 章节考察分布（堆积柱状图）</h3>
                <div class="chart-wrapper" id="stacked-bar-chart"></div>
            </div>
            
            <!-- 6. 高频知识点词云 -->

                <div class="chart-wrapper" id="wordcloud-chart"></div>
            </div>
            
            <!-- 7. 箱线图 -->

                <div class="chart-wrapper" id="boxplot-chart"></div>
            </div>
            
            <!-- 8. 桑基图 -->

                <div class="chart-wrapper" id="sankey-chart"></div>
            </div>
            
            <!-- 9. 知识点关联网络图 -->

                <div class="chart-wrapper" id="network-chart"></div>
            </div>

        // 初始化筛选器
        function initFilters() {
            // 年份筛选器
            const years = [...new Set(rawData.map(d => d.year))].sort((a, b) => b - a);
            const yearSelect = document.getElementById('year-range');
            
            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearSelect.appendChild(option);
            });
            
            // 章节筛选器
            const chapters = [...new Set(rawData.map(d => d.chapter))].sort();
            const chapterSelect = document.getElementById('chapter-filter');
            
            chapters.forEach(chapter => {
                const option = document.createElement('option');
                option.value = chapter;
                option.textContent = chapter;
                chapterSelect.appendChild(option);
            });
        }

        // 绑定事件
        function bindEvents() {
            document.getElementById('apply-filters').addEventListener('click', applyFilters);
            document.getElementById('reset-filters').addEventListener('click', resetFilters);
            
            // 窗口大小变化时重绘图表
            window.addEventListener('resize', () => {
                Object.values(chartInstances).forEach(chart => {
                    if (chart && chart.resize) chart.resize();
                });
            });
        }

        // 应用筛选
        function applyFilters() {
            const yearSelect = document.getElementById('year-range');
            const subjectSelect = document.getElementById('subject-filter');
            const chapterSelect = document.getElementById('chapter-filter');
            
            state.selectedYears = Array.from(yearSelect.selectedOptions).map(opt => opt.value);
            state.selectedSubject = subjectSelect.value;
            state.selectedChapter = chapterSelect.value;
            
            // 筛选数据
            state.filteredData = rawData.filter(item => {
                const yearMatch = state.selectedYears.includes('all') || 
                                state.selectedYears.includes(item.year.toString());
                const subjectMatch = state.selectedSubject === 'all' || 
                                   item.subject === state.selectedSubject;
                const chapterMatch = state.selectedChapter === 'all' || 
                                   item.chapter === state.selectedChapter;
                return yearMatch && subjectMatch && chapterMatch;
            });
            
            updateAllCharts();
        }

        // 4. 章节对比雷达图
        function createRadarChart() {
            const data = state.filteredData;
            const years = [...new Set(data.map(item => item.year))].sort((a, b) => a - b);
            const chapters = [...new Set(data.map(item => item.chapter))];
            
            // 选择最近的3个年份进行比较
            const recentYears = years.slice(-3);
            
            // 按年份和章节聚合数据
            const radarData = recentYears.map(year => {
                const yearData = data.filter(item => item.year === year);
                const chapterValues = {};
                
                chapters.forEach(chapter => {
                    const count = yearData
                        .filter(item => item.chapter === chapter)
                        .reduce((sum, item) => sum + item.count, 0);
                    chapterValues[chapter] = count;
                });
                
                return {
                    name: year,
                    value: Object.values(chapterValues)
                };
            });
            
            // 只显示考察次数最多的前8个章节
            const chapterTotals = chapters.map(chapter => {
                const total = data
                    .filter(item => item.chapter === chapter)
                    .reduce((sum, item) => sum + item.count, 0);
                return { chapter, total };
            }).sort((a, b) => b.total - a.total).slice(0, 8);
            
            const radarIndicator = chapterTotals.map(item => ({
                name: item.chapter,
                max: Math.max(...radarData.map(d => d.value[chapters.indexOf(item.chapter)])) + 2
            }));
            
            // 更新radarData，只包含前8个章节
            const filteredRadarData = radarData.map(yearData => ({
                name: yearData.name,
                value: chapterTotals.map(item => yearData.value[chapters.indexOf(item.chapter)])
            }));
            
            const chart = echarts.init(document.getElementById('radar-chart'));
            chartInstances.radar = chart;
            
            const option = {
                tooltip: {
                    trigger: 'item'
                },
                legend: {
                    data: recentYears,
                    top: 10
                },
                radar: {
                    indicator: radarIndicator,
                    shape: 'circle',
                    splitNumber: 5,
                    axisName: {
                        color: '#333',
                        fontSize: 12
                    }
                },
                series: [
                    {
                        name: '章节考察对比',
                        type: 'radar',
                        data: filteredRadarData,
                        color: ['#3498db', '#e74c3c', '#2ecc71']
                    }
                ]
            };
            
            chart.setOption(option);
        }

                    heatmapData.push([cIndex, yIndex, count]);

                });
                
                maxCounts.push(Math.max(...chapterValues));

                },
                legend: {
                    data: subjects,
                    top: 10
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '15%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: years,
                    axisLabel: {
                        rotate: 45
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '考察次数'
                },
                series: seriesData,
                color: ['#3498db', '#e74c3c']
            };
            
            chart.setOption(option);
        }

        // 7. 高频知识点词云
        function createWordCloudChart() {
            const data = state.filteredData;
            
            // 聚合所有知识点的考察次数
            const pointCounts = {};
            data.forEach(item => {
                pointCounts[item.point] = (pointCounts[item.point] || 0) + item.count;
            });
            
            const wordData = Object.entries(pointCounts)
                .map(([name, value]) => ({ 
                    name, 
                    value,
                    textStyle: {
                        color: value > 10 ? '#c0392b' : 
                               value > 5 ? '#e74c3c' : 
                               value > 2 ? '#3498db' : '#7f8c8d'
                    }
                }))
                .sort((a, b) => b.value - a.value)
                .slice(0, 50);
            
            const chart = echarts.init(document.getElementById('wordcloud-chart'));
            chartInstances.wordcloud = chart;
            
            const option = {
                tooltip: {
                    show: true,
                    formatter: function(params) {
                        return `${params.name}<br/>考察次数: ${params.value}`;
                    }
                },
                series: [{
                    type: 'wordCloud',
                    shape: 'circle',
                    left: 'center',
                    top: 'center',
                    width: '90%',
                    height: '90%',
                    right: null,
                    bottom: null,
                    sizeRange: [12, 60],
                    rotationRange: [-90, 90],
                    rotationStep: 45,
                    gridSize: 8,
                    drawOutOfBound: false,
                    textStyle: {
                        fontFamily: 'sans-serif',
                        fontWeight: 'bold',
                        color: function () {
                            return 'rgb(' + [
                                Math.round(Math.random() * 160),
                                Math.round(Math.random() * 160),
                                Math.round(Math.random() * 160)
                            ].join(',') + ')';
                        }
                    },
                    emphasis: {
                        textStyle: {
                            shadowBlur: 10,
                            shadowColor: '#333'
                        }
                    },
                    data: wordData
                }]
            };
            
            chart.setOption(option);
        }

        // 8. 箱线图
        function createBoxplotChart() {
            const data = state.filteredData;
            const chapters = [...new Set(data.map(item => item.chapter))];
            
            // 为每个章节收集所有考察次数
            const boxplotData = chapters.map(chapter => {
                const counts = data
                    .filter(item => item.chapter === chapter)
                    .map(item => item.count);
                
                // 计算统计量：最小值、Q1、中位数、Q3、最大值
                counts.sort((a, b) => a - b);
                const min = counts[0] || 0;
                const max = counts[counts.length - 1] || 0;
                const median = counts[Math.floor(counts.length / 2)] || 0;
                const q1 = counts[Math.floor(counts.length / 4)] || 0;
                const q3 = counts[Math.floor(counts.length * 3 / 4)] || 0;
                
                return [min, q1, median, q3, max];
            });
            
            // 只显示前10个章节
            const topChapters = chapters.slice(0, 10);
            const topBoxplotData = boxplotData.slice(0, 10);
            
            const chart = echarts.init(document.getElementById('boxplot-chart'));
            chartInstances.boxplot = chart;
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                grid: {
                    left: '10%',
                    right: '10%',
                    bottom: '15%',
                    top: '10%'
                },
                xAxis: {
                    type: 'category',
                    data: topChapters,
                    axisLabel: {
                        rotate: 45
                    },
                    boundaryGap: true,
                    nameGap: 30
                },
                yAxis: {
                    type: 'value',
                    name: '考察次数',
                    min: 0
                },
                series: [
                    {
                        name: '考察次数分布',
                        type: 'boxplot',
                        data: topBoxplotData,
                        itemStyle: {
                            color: '#3498db',
                            borderColor: '#2980b9'
                        }
                    }
                ]
            };
            
            chart.setOption(option);
        }

        // 9. 桑基图
        function createSankeyChart() {
            const data = state.filteredData;
            
            // 按年份和章节创建节点
            const years = [...new Set(data.map(item => item.year))].sort((a, b) => a - b);
            const chapters = [...new Set(data.map(item => item.chapter))];
            
            const nodes = [];
            const nodeMap = {};
            
            // 添加年份节点
            years.forEach(year => {
                const nodeId = `year-${year}`;
                nodeMap[nodeId] = nodes.length;
                nodes.push({
                    name: `${year}年`,
                    depth: 0
                });
            });
            
            // 添加章节节点
            chapters.forEach(chapter => {
                const nodeId = `chapter-${chapter}`;
                nodeMap[nodeId] = nodes.length;
                nodes.push({
                    name: chapter,
                    depth: 1
                });
            });
            
            // 创建链接
            const links = [];
            
            years.forEach(year => {
                const yearData = data.filter(item => item.year === year);
                const yearNodeId = `year-${year}`;
                
                // 统计该年份各章节的考察次数
                const chapterCounts = {};
                chapters.forEach(chapter => {
                    const count = yearData
                        .filter(item => item.chapter === chapter)
                        .reduce((sum, item) => sum + item.count, 0);
                    if (count > 0) {
                        chapterCounts[chapter] = count;
                    }
                });
                
                // 创建链接
                Object.entries(chapterCounts).forEach(([chapter, count]) => {
                    const chapterNodeId = `chapter-${chapter}`;
                    links.push({
                        source: nodeMap[yearNodeId],
                        target: nodeMap[chapterNodeId],
                        value: count,
                        lineStyle: {
                            color: year > 2020 ? '#3498db' : 
                                   year > 2017 ? '#2ecc71' : '#9b59b6'
                        }
                    });
                });
            });
            
            const chart = echarts.init(document.getElementById('sankey-chart'));
            chartInstances.sankey = chart;
            
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.dataType === 'node') {
                            return params.name;
                        } else if (params.dataType === 'edge') {
                            return `${params.data.sourceName} → ${params.data.targetName}<br/>考察次数: ${params.value}`;
                        }
                    }
                },
                series: {
                    type: 'sankey',
                    layout: 'none',
                    data: nodes,
                    links: links,
                    emphasis: {
                        focus: 'adjacency'
                    },
                    lineStyle: {
                        color: 'source',
                        curveness: 0.5
                    },
                    label: {
                        fontSize: 10
                    }
                }
            };
            
            chart.setOption(option);
        }

        // 10. 知识点关联网络图
        function createNetworkChart() {
            const data = state.filteredData;
            
            // 分析知识点之间的共现关系（同一年份内）
            const years = [...new Set(data.map(item => item.year))];
            const pointSet = new Set(data.map(item => item.point));
            const nodes = Array.from(pointSet).map(name => ({ 
                id: name, 
                name,
                symbolSize: 10,
                itemStyle: {
                    color: name.includes('函数') ? '#3498db' : 
                           name.includes('均衡') ? '#2ecc71' : 
                           name.includes('模型') ? '#9b59b6' : 
                           name.includes('理论') ? '#e74c3c' : '#f39c12'
                }
            }));
            
            const links = [];
            const cooccurrence = {};
            
            years.forEach(year => {
                const yearPoints = data
                    .filter(item => item.year === year)
                    .map(item => item.point);
                
                // 计算共现次数
                for (let i = 0; i < yearPoints.length; i++) {
                    for (let j = i + 1; j < yearPoints.length; j++) {
                        const key = [yearPoints[i], yearPoints[j]].sort().join('|');
                        cooccurrence[key] = (cooccurrence[key] || 0) + 1;
                    }
                }
            });
            
            // 创建链接
            Object.entries(cooccurrence).forEach(([key, value]) => {
                const [source, target] = key.split('|');
                if (value >= 2) { // 只显示共现次数大于等于2的关系
                    links.push({
                        source,
                        target,
                        value,
                        lineStyle: {
                            width: value * 0.5,
                            color: value >= 4 ? '#e74c3c' : 
                                   value >= 3 ? '#3498db' : '#95a5a6'
                        }
                    });
                }
            });
            
            const chart = echarts.init(document.getElementById('network-chart'));
            chartInstances.network = chart;
            
            const option = {
                tooltip: {
                    formatter: function(params) {
                        if (params.dataType === 'node') {
                            return params.data.name;
                        } else if (params.dataType === 'edge') {
                            return `${params.data.source} ↔ ${params.data.target}<br/>共现次数: ${params.data.value}`;
                        }
                    }
                },
                legend: {
                    data: ['函数类', '均衡类', '模型类', '理论类', '其他'],
                    top: 10
                },
                series: [
                    {
                        type: 'graph',
                        layout: 'force',
                        animation: true,
                        label: {
                            show: true,
                            position: 'right',
                            fontSize: 10
                        },
                        draggable: true,
                        data: nodes,
                        links: links,
                        categories: [
                            { name: '函数类' },
                            { name: '均衡类' },
                            { name: '模型类' },
                            { name: '理论类' },
                            { name: '其他' }
                        ],
                        roam: true,
                        focusNodeAdjacency: true,
                        itemStyle: {
                            borderColor: '#fff',
                            borderWidth: 1,
                            shadowBlur: 10,
                            shadowColor: 'rgba(0, 0, 0, 0.3)'
                        },
                        lineStyle: {
                            color: 'source',
                            curveness: 0.3
                        },
                        emphasis: {
                            lineStyle: {
                                width: 5
                            }
                        },
                        force: {
                            repulsion: 200,
                            edgeLength: 50
                        }
                    }
                ]
            };
            
            chart.setOption(option);
        }

        // 更新分析洞察
        function updateInsights() {
            const data = state.filteredData;
            
            // 计算洞察数据
            const totalExams = data.reduce((sum, item) => sum + item.count, 0);
            const years = [...new Set(data.map(item => item.year))];
            
            // 按学科统计
            const subjectCount = {
                '微观经济学': 0,
                '宏观经济学': 0
            };
            
            data.forEach(item => {
                subjectCount[item.subject] += item.count;
            });
            
            // 按章节统计
            const chapterCounts = {};
            data.forEach(item => {
                chapterCounts[item.chapter] = (chapterCounts[item.chapter] || 0) + item.count;
            });
            
            const topChapters = Object.entries(chapterCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);
            
            // 按知识点统计
            const pointCounts = {};
            data.forEach(item => {
                pointCounts[item.point] = (pointCounts[item.point] || 0) + item.count;
            });
            
            const topPoints = Object.entries(pointCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);
            
            // 趋势分析
            const yearlyData = {};
            years.sort((a, b) => a - b).forEach(year => {
                yearlyData[year] = data
                    .filter(item => item.year === year)
                    .reduce((sum, item) => sum + item.count, 0);
            });
            
            const yearValues = Object.values(yearlyData);
            const trend = yearValues.length >= 2 ? 
                (yearValues[yearValues.length - 1] - yearValues[0]) / yearValues[0] * 100 : 0;
            
            // 更新洞察列表
            const insightList = document.getElementById('insight-list');
            insightList.innerHTML = `
                <li><strong>数据概况：</strong>共分析 ${years.length} 年数据，总计 ${totalExams} 次考察，覆盖 ${Object.keys(pointCounts).length} 个知识点</li>
                <li><strong>学科分布：</strong>微观经济学占比 ${((subjectCount['微观经济学'] / totalExams) * 100).toFixed(1)}%，宏观经济学占比 ${((subjectCount['宏观经济学'] / totalExams) * 100).toFixed(1)}%</li>
                <li><strong>重点章节：</strong>${topChapters.map(c => `${c[0]}(${c[1]}次)`).join('、')}</li>
                <li><strong>高频知识点：</strong>${topPoints.map(p => `${p[0]}(${p[1]}次)`).join('、')}</li>
                <li><strong>趋势变化：</strong>从${years[0]}年到${years[years.length-1]}年，考察次数${trend > 0 ? '增长' : '下降'}了${Math.abs(trend).toFixed(1)}%</li>
                <li><strong>备考建议：</strong>重点关注${topChapters[0] ? topChapters[0][0] : ''}章节和${topPoints[0] ? topPoints[0][0] : ''}等高频知识点</li>
            `;
        }

        // 切换图表类型
        function toggleChartType(chartType) {
            if (chartType === 'trend') {
                const chart = chartInstances.trend;
                const currentOption = chart.getOption();
                const currentSeriesType = currentOption.series[0].type;
                
                const newType = currentSeriesType === 'line' ? 'bar' : 'line';
                
                currentOption.series.forEach(series => {
                    series.type = newType;
                });
                
                chart.setOption(currentOption);
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
